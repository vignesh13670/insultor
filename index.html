<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insultor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #f9fafb;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .app {
      width: 100%;
      max-width: 700px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    .sub {
      margin: 0 0 22px;
      color: #d1d5db;
      line-height: 1.5;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .question {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .choices {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }
    .yes { background: #10b981; color: white; }
    .no { background: #ef4444; color: white; }
    .next { background: #3b82f6; color: white; }
    .reset { background: #e5e7eb; color: #111827; }
    .response {
      min-height: 110px;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #f3f4f6;
      white-space: pre-wrap;
    }
    .meter-wrap {
      margin-top: 18px;
    }
    .meter-label {
      display: flex;
      justify-content: space-between;
      color: #d1d5db;
      font-size: 0.92rem;
      margin-bottom: 6px;
    }
    .meter {
      width: 100%;
      height: 14px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      transition: width 0.25s ease;
    }
    .small {
      color: #cbd5e1;
      font-size: 0.9rem;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Insultor</h1>
    <p class="sub">A tough-love study checker. It asks if you studied today. If not, it gives you a sharp but non-abusive push to get back to work.</p>

    <div class="card">
      <div class="question" id="question">Did you study today?</div>
      <div class="choices">
        <button class="yes" id="yesBtn">Yes</button>
        <button class="no" id="noBtn">No</button>
        <button class="next" id="nextBtn">Next Question</button>
        <button class="reset" id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="card response" id="response">Press a button to begin.</div>

    <div class="meter-wrap">
      <div class="meter-label">
        <span>Excuse level</span>
        <span id="scoreText">0 / 5</span>
      </div>
      <div class="meter">
        <div class="fill" id="fill"></div>
      </div>
    </div>

    <div class="small">Questions and replies are stored only in this browser session.</div>
  </div>

  <script>
    const questions = [
      "Did you study today?",
      "Did you finish the task you said you would do?",
      "Did you revise instead of scrolling?",
      "Did you avoid procrastinating for most of the day?",
      "Would future-you be impressed by your effort today?"
    ];

    const noReplies = [
      "Be serious. Your books are not going to open themselves. Sit down and study for 20 minutes right now.",
      "That was weak. Less stalling, more studying. Start with one chapter or one problem set now.",
      "You are training your excuses better than your brain. Fix that. Open your notes and begin.",
      "A deadline will not feel sorry for you. Do the work before the panic does it for you.",
      "This is not your best effort and you know it. Put the phone down and earn a better answer."
    ];

    const yesReplies = [
      "Good. Keep the streak alive.",
      "Nice. Consistency beats motivation.",
      "Solid work. Do a little more and lock it in.",
      "That is what progress looks like.",
      "Well done. Keep going tomorrow too."
    ];

    let index = 0;
    let noCount = 0;

    const questionEl = document.getElementById("question");
    const responseEl = document.getElementById("response");
    const scoreText = document.getElementById("scoreText");
    const fill = document.getElementById("fill");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    function updateView() {
      questionEl.textContent = questions[index];
      scoreText.textContent = `${noCount} / ${questions.length}`;
      fill.style.width = `${(noCount / questions.length) * 100}%`;
    }

    function respond(studied) {
      if (studied) {
        responseEl.textContent = yesReplies[index];
      } else {
        noCount += 1;
        responseEl.textContent = noReplies[index];
        scoreText.textContent = `${noCount} / ${questions.length}`;
        fill.style.width = `${(noCount / questions.length) * 100}%`;
      }
    }

    yesBtn.addEventListener("click", () => respond(true));
    noBtn.addEventListener("click", () => respond(false));

    nextBtn.addEventListener("click", () => {
      if (index < questions.length - 1) {
        index += 1;
        updateView();
        responseEl.textContent = "Answer the next one honestly.";
      } else {
        responseEl.textContent = noCount === 0
          ? "Perfect score. You actually did the work."
          : `Done. You dodged ${noCount} question(s). Time to stop negotiating and study.`;
      }
    });

    resetBtn.addEventListener("click", () => {
      index = 0;
      noCount = 0;
      updateView();
      responseEl.textContent = "Press a button to begin.";
    });

    updateView();
  </script>
</body>
</html>
